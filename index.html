<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>業務確認フォーム</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: "Hiragino Sans", "Hiragino Kaku Gothic ProN", "Noto Sans JP",
                     -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #e8eef5 0%, #f0f2f5 40%, #f0f2f5 100%);
        padding: 16px 12px 32px;
        color: #1a202c;
        margin: 0;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      .card {
        max-width: 640px;
        margin: 0 auto;
        background: #fff;
        padding: 24px 18px 28px;
        border-radius: 16px;
        box-shadow: 0 8px 24px rgba(26, 54, 93, 0.08);
      }
      h2 {
        text-align: center;
        color: #0f172a;
        margin: 0 0 8px;
        font-size: 22px;
        font-weight: 800;
        letter-spacing: 0.04em;
      }
      .page-sub {
        text-align: center;
        color: #64748b;
        font-size: 13px;
        margin-bottom: 22px;
        padding-bottom: 16px;
        border-bottom: 3px solid #22c55e;
      }
      .job-block {
        margin-bottom: 20px;
        padding: 16px 14px 8px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
      }
      .job-block:last-of-type { margin-bottom: 8px; }
      .job-title {
        font-size: 15px;
        font-weight: 800;
        color: #15803d;
        margin: -4px 0 14px;
        padding: 10px 12px;
        background: #dcfce7;
        border-left: 4px solid #22c55e;
        border-radius: 0 8px 8px 0;
        letter-spacing: 0.02em;
      }
      .highlight-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 16px;
      }
      .highlight-card {
        background: #fff;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        padding: 12px 12px 10px;
      }
      .highlight-card .info-label {
        margin-bottom: 4px;
        color: #64748b;
      }
      .highlight-card .info-value {
        font-size: 20px;
        font-weight: 800;
        color: #0f172a;
        letter-spacing: 0.02em;
      }
      .info-list { margin: 0; padding: 0; list-style: none; }
      .info-item {
        margin-bottom: 0;
        padding: 12px 4px;
        border-bottom: 1px solid #e2e8f0;
      }
      .info-item:last-child { border-bottom: none; }
      .info-item.emphasis {
        background: #fff;
        margin: 0 -6px 0;
        padding: 14px 10px;
        border-radius: 8px;
        border-bottom: 1px solid #e2e8f0;
      }
      .info-label {
        font-size: 11px;
        color: #94a3b8;
        font-weight: 700;
        margin-bottom: 5px;
        letter-spacing: 0.08em;
        text-transform: none;
      }
      .info-value {
        font-size: 16px;
        color: #1e293b;
        line-height: 1.65;
        word-break: break-word;
        white-space: pre-wrap;
        font-weight: 600;
      }
      .info-item.emphasis .info-value {
        font-size: 18px;
        font-weight: 800;
        color: #0f172a;
      }
      .info-value a {
        color: #2563eb;
        text-decoration: underline;
        font-weight: 700;
      }
      .btn-box { text-align: center; margin-top: 28px; }
      .btn {
        background-color: #16a34a;
        color: #fff;
        border: none;
        padding: 18px 16px;
        font-size: 17px;
        border-radius: 10px;
        cursor: pointer;
        width: 100%;
        font-weight: 800;
        letter-spacing: 0.04em;
        box-shadow: 0 4px 12px rgba(22, 163, 74, 0.28);
        -webkit-tap-highlight-color: transparent;
      }
      .btn:active { background-color: #15803d; }
      .btn:disabled {
        background-color: #cbd5e1;
        color: #64748b;
        cursor: not-allowed;
        box-shadow: none;
      }
      .msg {
        text-align: center;
        font-weight: 700;
        margin-top: 18px;
        font-size: 15px;
        line-height: 1.6;
      }
      .loading {
        text-align: center;
        color: #64748b;
        padding: 48px 0;
        font-size: 16px;
        font-weight: 600;
      }
      @media (max-width: 420px) {
        .highlight-row { grid-template-columns: 1fr; }
        h2 { font-size: 20px; }
        .highlight-card .info-value { font-size: 18px; }
        .info-value { font-size: 15px; }
        .info-item.emphasis .info-value { font-size: 17px; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>業務詳細確認</h2>
      <div class="page-sub">内容を確認のうえ、下部のボタンを押してください</div>
      <div id="content">
        <div class="loading">読み込み中...</div>
      </div>
    </div>

    <script>
      // ===== 設定：親GASウェブアプリ(API)のURL（全コピー共通・1つだけ） =====
      const API_URL = 'https://script.google.com/macros/s/AKfycbyRsjpi2w7TLx31zqny5Q3Oau6mZuMPyLW-XjWpdKMCilzd9HeKgIE_KWjGU_85m-ipzw/exec';
      // ==========================================

      // URLパラメータの取得
      // no は単一 "1" または複数 "1,2"
      // sheet = 対象スプレッドシートのID
      const urlParams = new URLSearchParams(window.location.search);
      const NO = urlParams.get('no');
      const STAFF_ID = urlParams.get('staffId');
      const SHEET_ID = urlParams.get('sheet');

      // JSONPでGASを呼び出す共通関数
      let jsonpCounter = 0;
      function callApi(params, onSuccess, onError) {
        const callbackName = 'gasCallback_' + (jsonpCounter++) + '_' + Date.now();
        const script = document.createElement('script');
        let timer = null;

        window[callbackName] = function(res) {
          if (timer) clearTimeout(timer);
          delete window[callbackName];
          document.body.removeChild(script);
          onSuccess(res);
        };

        const query = Object.keys(params)
          .map(k => encodeURIComponent(k) + '=' + encodeURIComponent(params[k]))
          .join('&');
        script.src = API_URL + '?' + query + '&callback=' + callbackName;
        script.onerror = function() {
          if (timer) clearTimeout(timer);
          delete window[callbackName];
          if (script.parentNode) document.body.removeChild(script);
          onError();
        };
        timer = setTimeout(function() {
          if (window[callbackName]) {
            delete window[callbackName];
            if (script.parentNode) document.body.removeChild(script);
            onError();
          }
        }, 60000);
        document.body.appendChild(script);
      }

      function escapeHtml(str) {
        if (str == null) return '';
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function linkify(str) {
        let html = escapeHtml(str).replace(/\n/g, '<br>');
        const urlPattern = /(https?:\/\/[^\s<>"']+)/g;
        return html.replace(urlPattern, '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>');
      }

      // 会場名をGoogleマップ検索リンクにする（すでにURLが入っている場合はそのままリンク化）
      function venueWithMapsLink(venueName) {
        if (venueName == null || String(venueName).trim() === '') return '';
        const text = String(venueName);
        if (/https?:\/\//.test(text)) {
          return linkify(text);
        }
        const mapsUrl = 'https://www.google.com/maps/search/?api=1&query=' + encodeURIComponent(text);
        return '<a href="' + mapsUrl + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(text) + '</a>';
      }

      const contentEl = document.getElementById('content');

      function showError(msg) {
        contentEl.innerHTML = '<div class="msg" style="color:#e74c3c;">' + escapeHtml(msg) + '</div>';
      }

      function buildJobRows(job) {
        // [ラベル, 値HTML, 強調クラス]
        return [
          ['催事名', linkify(job.eventName), 'emphasis'],
          ['会場名', venueWithMapsLink(job.venueName), 'emphasis'],
          ['業務', linkify(job.task), 'emphasis'],
          ['時給', escapeHtml(job.hourlyWage), ''],
          ['集合場所', linkify(job.meetPlace), 'emphasis'],
          ['服装', linkify(job.clothing), ''],
          ['備考', linkify(job.remarks), ''],
          ['食事', linkify(job.meal), ''],
          ['持ち物', linkify(job.belongings), ''],
          ['終了時間', escapeHtml(job.endTime), '']
        ];
      }

      // 画面描画（1件でも複数でも jobs 配列で受け取る）
      function render(data) {
        const jobs = data.jobs || [];
        if (jobs.length === 0) {
          showError('表示する業務がありません。');
          return;
        }

        let html = '';
        jobs.forEach(function(job, index) {
          html += '<div class="job-block">';
          if (jobs.length > 1) {
            html += '<div class="job-title">業務' + (index + 1) + '／' + jobs.length + '</div>';
          }
          html += '<div class="highlight-row">';
          html += '<div class="highlight-card"><div class="info-label">勤務日</div><div class="info-value">' +
                  escapeHtml(job.workDate || '-') + '</div></div>';
          html += '<div class="highlight-card"><div class="info-label">集合時間</div><div class="info-value">' +
                  escapeHtml(job.meetTime || '-') + '</div></div>';
          html += '</div>';
          html += '<div class="info-list">';
          buildJobRows(job).forEach(function(r) {
            const cls = r[2] ? ' info-item ' + r[2] : ' info-item';
            html += '<div class="' + cls.trim() + '"><div class="info-label">' + r[0] +
                    '</div><div class="info-value">' + r[1] + '</div></div>';
          });
          html += '</div></div>';
        });

        if (data.isConfirmed) {
          html += '<div class="btn-box"><button class="btn" disabled>確認済み</button></div>';
          html += '<div class="msg" style="color:#64748b;">この業務は確認手続きが完了しています。</div>';
        } else {
          const btnLabel = jobs.length > 1 ? 'すべて確認しました' : '確認しました';
          html += '<div class="btn-box" id="btn-area"><button class="btn" id="submit-btn">' + btnLabel + '</button></div>';
          html += '<div id="result-msg" class="msg"></div>';
        }
        contentEl.innerHTML = html;

        if (!data.isConfirmed) {
          document.getElementById('submit-btn').addEventListener('click', sendConfirm);
        }
      }

      // 確認ボタン送信（複数業務をまとめて記録）
      function sendConfirm() {
        const btn = document.getElementById('submit-btn');
        const originalLabel = btn.innerText;
        btn.disabled = true;
        btn.innerText = '送信中...';

        callApi(
          { action: 'confirm', no: NO, staffId: STAFF_ID, sheet: SHEET_ID },
          function(res) {
            if (res && res.status === 'success') {
              document.getElementById('btn-area').innerHTML = '<button class="btn" disabled>確認済み</button>';
              const msg = document.getElementById('result-msg');
              msg.style.color = '#7f8c8d';
              msg.innerText = '確認手続きが完了しました。お疲れ様でした。';
            } else {
              btn.disabled = false;
              btn.innerText = originalLabel;
              alert('エラーが発生しました: ' + (res && res.message ? res.message : '不明なエラー'));
            }
          },
          function() {
            btn.disabled = false;
            btn.innerText = originalLabel;
            alert('通信エラーが発生しました。時間をおいて再度お試しください。');
          }
        );
      }

      // 初期表示
      if (!NO || !STAFF_ID || !SHEET_ID) {
        showError('エラー: 不正なアクセスです。');
      } else {
        callApi(
          { action: 'getData', no: NO, staffId: STAFF_ID, sheet: SHEET_ID },
          function(res) {
            if (res && res.status === 'success') {
              render(res);
            } else {
              showError(res && res.message ? res.message : 'データを取得できませんでした。');
            }
          },
          function() {
            showError('通信エラーが発生しました。時間をおいて再度お試しください。');
          }
        );
      }
    </script>
  </body>
</html>
